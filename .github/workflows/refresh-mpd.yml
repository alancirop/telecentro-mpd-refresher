name: Telecentro MPD Refresher
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run MPD Refresher
        env:
          TC_EMAIL:         ${{ secrets.TC_EMAIL }}
          TC_PASSWORD:      ${{ secrets.TC_PASSWORD }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: node index.js
